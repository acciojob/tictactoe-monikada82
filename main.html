<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tic Tac Toe</title>
  <style>
    .container {
      text-align: center;
      margin-top: 50px;
      font-family: Arial, sans-serif;
    }
    #board {
      display: none;
      margin: 20px auto;
      width: 300px;
      display: grid;
      grid-template-columns: repeat(3, 100px);
      grid-template-rows: repeat(3, 100px);
      gap: 5px;
    }
    .cell {
      border: 2px solid #333;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2em;
      cursor: pointer;
    }
    .message {
      margin-top: 20px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="player-inputs">
      <input type="text" id="player-1" placeholder="Enter Player 1 Name">
      <input type="text" id="player-2" placeholder="Enter Player 2 Name">
      <button id="submit">Submit</button>
    </div>

    <div id="board-page">
      <h1>Tic Tac Toe</h1>
      <div class="message"></div>
      <div id="board">
        <div class="cell" id="1"></div>
        <div class="cell" id="2"></div>
        <div class="cell" id="3"></div>
        <div class="cell" id="4"></div>
        <div class="cell" id="5"></div>
        <div class="cell" id="6"></div>
        <div class="cell" id="7"></div>
        <div class="cell" id="8"></div>
        <div class="cell" id="9"></div>
      </div>
    </div>
  </div>

  <script>
    const submitBtn = document.getElementById('submit');
    const playerInputs = document.getElementById('player-inputs');
    const board = document.getElementById('board');
    const messageDiv = document.querySelector('.message');
    const cells = document.querySelectorAll('.cell');

    let player1 = '';
    let player2 = '';
    let currentPlayer = '';
    let currentSymbol = '';
    let gameActive = true;

    const winningCombinations = [
      [1,2,3],[4,5,6],[7,8,9],
      [1,4,7],[2,5,8],[3,6,9],
      [1,5,9],[3,5,7]
    ];

    submitBtn.addEventListener('click', () => {
      player1 = document.getElementById('player-1').value.trim();
      player2 = document.getElementById('player-2').value.trim();

      if(player1 && player2) {
        playerInputs.style.display = 'none';
        board.style.display = 'grid';
        currentPlayer = player1;
        currentSymbol = 'X';
        messageDiv.textContent = `${currentPlayer}, you're up`;
      }
    });

    cells.forEach(cell => {
      cell.addEventListener('click', () => {
        if(!gameActive || cell.textContent !== '') return;

        cell.textContent = currentSymbol;

        if(checkWin()) {
          messageDiv.textContent = `${currentPlayer}, congratulations you won!`;
          gameActive = false;
          return;
        }

        // Switch player
        if(currentPlayer === player1) {
          currentPlayer = player2;
          currentSymbol = 'O';
        } else {
          currentPlayer = player1;
          currentSymbol = 'X';
        }
        messageDiv.textContent = `${currentPlayer}, you're up`;
      });
    });

    function checkWin() {
      return winningCombinations.some(combination => {
        const [a,b,c] = combination;
        const cellA = document.getElementById(a).textContent;
        const cellB = document.getElementById(b).textContent;
        const cellC = document.getElementById(c).textContent;
        return cellA && cellA === cellB && cellB === cellC;
      });
    }
  </script>
</body>
</html>
